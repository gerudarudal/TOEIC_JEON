<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>토익 문법 퀴즈 - 오답노트 버전</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #6c757d;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --part1-color: #007bff;
            --part2-color: #28a745;
            --correct-color: #2b8a3e;
            --incorrect-color: #c92a2a;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .hidden {
            display: none !important;
        }

        /* 파트별 섹션 스타일 */
        .part-section {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .part-section h2 {
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 15px;
            color: #495057;
        }

        .mode-btn-container {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 12px 15px;
            font-size: 15px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            flex: 1;
        }

        .btn-part1 { background-color: var(--part1-color); color: white; }
        .btn-part1:hover { background-color: #0056b3; }

        .btn-part2 { background-color: var(--part2-color); color: white; }
        .btn-part2:hover { background-color: #1e7e34; }

        .btn-primary { background-color: var(--primary-color); color: white; width: 100%; }
        .btn-primary:hover { background-color: #357abd; }

        .btn-secondary { background-color: var(--secondary-color); color: white; width: 100%; margin-top: 10px; }
        .btn-secondary:hover { background-color: #5a6268; }

        .btn-correct { background-color: var(--correct-color); color: white; }
        .btn-correct:hover { background-color: #237032; }

        .btn-incorrect { background-color: var(--incorrect-color); color: white; }
        .btn-incorrect:hover { background-color: #a62323; }

        /* 퀴즈 화면 스타일 */
        .quiz-card {
            background-color: #f1f3f5;
            border-radius: 8px;
            padding: 30px 20px;
            margin-bottom: 25px;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        .word-text { font-size: 32px; font-weight: 800; color: #212529; }
        .meaning-text { font-size: 22px; font-weight: 600; color: #e03131; }
        .sentence-text { font-size: 16px; color: #0b7285; line-height: 1.5; word-break: keep-all; }
        
        .progress-text {
            font-size: 14px;
            color: #868e96;
            margin-bottom: 20px;
            text-align: right;
            font-weight: bold;
        }

        .controls { display: flex; flex-direction: column; gap: 10px; }
        .sub-controls { display: flex; gap: 10px; width: 100%; }

        /* 결과 화면 텍스트 */
        .result-text { font-size: 20px; font-weight: bold; margin-bottom: 30px; color: #333; line-height: 1.6;}
        .highlight { color: var(--incorrect-color); font-size: 24px;}
    </style>
</head>
<body>

    <!-- 1. 시작 화면 -->
    <div class="container" id="start-screen">
        <h1>토익 문법 퀴즈</h1>
        <p style="margin-bottom: 25px; color: #666;">학습할 파트와 방식을 선택해주세요.</p>
        
        <div class="part-section">
            <h2>1부: 부사 (92문제)</h2>
            <div class="mode-btn-container">
                <button class="btn-part1" onclick="startQuiz('part1', 'sequential')">순서대로</button>
                <button class="btn-part1" onclick="startQuiz('part1', 'random')">랜덤 풀기</button>
            </div>
        </div>

        <div class="part-section">
            <h2>2부: 접속사/관계대명사 (8문제)</h2>
            <div class="mode-btn-container">
                <button class="btn-part2" onclick="startQuiz('part2', 'sequential')">순서대로</button>
                <button class="btn-part2" onclick="startQuiz('part2', 'random')">랜덤 풀기</button>
            </div>
        </div>
    </div>

    <!-- 2. 퀴즈 화면 -->
    <div class="container hidden" id="quiz-screen">
        <div class="progress-text" id="progress-display">1 / 100</div>
        
        <div class="quiz-card">
            <div class="word-text" id="display-word">Word</div>
            <div class="meaning-text hidden" id="display-meaning">Meaning</div>
            <div class="sentence-text hidden" id="display-sentence">Sentence</div>
        </div>

        <div class="controls">
            <!-- 기본 메인 버튼 -->
            <button class="btn-primary" id="main-action-btn" onclick="handleMainAction()">정답 확인 (뜻/내용)</button>
            
            <!-- 마지막 단계에서 나타나는 O/X 버튼 -->
            <div class="sub-controls hidden" id="ox-controls">
                <button class="btn-correct" onclick="submitAnswer(true)">완벽히 앎 (O)</button>
                <button class="btn-incorrect" onclick="submitAnswer(false)">다시 풀기 (X)</button>
            </div>

            <div class="sub-controls">
                <button class="btn-secondary" onclick="resetCurrentQuestion()">방금 문제 다시풀기</button>
                <button class="btn-secondary" onclick="goToHome()">처음으로</button>
            </div>
        </div>
    </div>

    <!-- 3. 결과 및 오답노트 화면 -->
    <div class="container hidden" id="result-screen">
        <h1>학습 완료!</h1>
        <div class="result-text" id="result-message">
            총 <span id="total-count">0</span>문제 중<br>
            <span class="highlight" id="incorrect-count">0</span>문제를 틀렸습니다.
        </div>
        
        <div class="controls" id="result-controls">
            <button class="btn-incorrect hidden" id="btn-review-incorrect" onclick="startReviewQuiz()">틀린 문제 다시 풀기</button>
            <button class="btn-primary" onclick="goToHome()">처음 화면으로</button>
        </div>
    </div>

                    meaning: parts[1] ? parts[1].trim() : "",
                    sentence: parts.length > 2 ? parts.slice(2).join(' > ').trim() : "" 
                };
            });
        }

        // 2부 데이터
        const rawDataPart2 = [

        // 상태 변수

        // DOM 요소

        // 퀴즈 시작 함수
        function startQuiz(part, mode) {

                activeQuizData = [...quizDataPart1];

            } else if (part === 'part2') {
                activeQuizData = [...quizDataPart2];
                currentModeLabel = "2부";
            }

            currentIndex = 0;
            questionOrder = Array.from({length: activeQuizData.length}, (_, i) => i);
            
            if (mode === 'random') {
                for (let i = questionOrder.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [questionOrder[i], questionOrder[j]] = [questionOrder[j], questionOrder[i]];
                }
            }

            startScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            
            renderQuestion();
        }

        // 오답 퀴즈 시작 함수
        function startReviewQuiz() {
            activeQuizData = [...incorrectQuestions]; // 오답 데이터로 교체
            incorrectQuestions = []; // 다시 오답을 담기 위해 비움
            currentModeLabel = "오답노트";
            
            currentIndex = 0;
            questionOrder = Array.from({length: activeQuizData.length}, (_, i) => i);
            
            resultScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            
            renderQuestion();
        }

        // 문제 화면 그리기
        function renderQuestion() {
            if (currentIndex >= questionOrder.length) {
                showResultScreen();
                return;
            }

            step = 0;
            const currentData = activeQuizData[questionOrder[currentIndex]];

            displayWord.textContent = currentData.word;
            displayMeaning.textContent = currentData.meaning;
            displaySentence.textContent = currentData.sentence;

            progressDisplay.textContent = "[" + currentModeLabel + "] " + (currentIndex + 1) + " / " + questionOrder.length;

            displayMeaning.classList.add('hidden');
            displaySentence.classList.add('hidden');
            
            mainActionBtn.classList.remove('hidden');
            oxControls.classList.add('hidden');
            mainActionBtn.textContent = "정답 확인 (뜻/내용)";
        }

        // 메인 버튼 동작
        function handleMainAction() {
            const currentData = activeQuizData[questionOrder[currentIndex]];
            const hasSentence = currentData.sentence !== ""; 

            if (step === 0) {
                displayMeaning.classList.remove('hidden');
                
                if (hasSentence) {
                    mainActionBtn.textContent = "정답 확인 (세부내용)";
                    step = 1;
                } else {
                    showOXButtons(); // 3번째 내용 없으면 바로 O/X 버튼 표시
                    step = 2; 
                }
            } else if (step === 1) {
                displaySentence.classList.remove('hidden');
                showOXButtons(); // 모든 내용 공개 후 O/X 버튼 표시
                step = 2;
            }
        }

        // O/X 버튼 활성화
        function showOXButtons() {
            mainActionBtn.classList.add('hidden');
            oxControls.classList.remove('hidden');
        }

        // O/X 선택 처리
        function submitAnswer(isCorrect) {
            if (!isCorrect) {
                // 틀렸으면 오답 배열에 현재 데이터 추가
                incorrectQuestions.push(activeQuizData[questionOrder[currentIndex]]);
            }
            
            currentIndex++;
            renderQuestion();
        }

        // 결과 화면 표시
        function showResultScreen() {
            quizScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');

            document.getElementById('total-count').textContent = questionOrder.length;
            document.getElementById('incorrect-count').textContent = incorrectQuestions.length;

            const btnReview = document.getElementById('btn-review-incorrect');
            if (incorrectQuestions.length > 0) {
                btnReview.classList.remove('hidden');
            } else {
                btnReview.classList.add('hidden');
            }
        }

        // 방금 문제 다시풀기
        function resetCurrentQuestion() {
            step = 0;
            displayMeaning.classList.add('hidden');
            displaySentence.classList.add('hidden');
            
            mainActionBtn.classList.remove('hidden');
            oxControls.classList.add('hidden');
            mainActionBtn.textContent = "정답 확인 (뜻/내용)";
        }

        // 처음 화면으로 돌아가기
        function goToHome() {
            quizScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
        }
    </script>
</body>
</html>
