<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>토익 문법 퀴즈 V2</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #6c757d;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .hidden {
            display: none !important;
        }

        /* 시작 화면 버튼 스타일 */
        .mode-btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            padding: 15px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            width: 100%;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: #357abd;
        }

        .btn-secondary {
            background-color: var(--secondary-color);
            color: white;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background-color: #5a6268;
        }

        /* 퀴즈 화면 스타일 */
        .quiz-card {
            background-color: #f1f3f5;
            border-radius: 8px;
            padding: 30px 20px;
            margin-bottom: 25px;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        .word-text {
            font-size: 32px;
            font-weight: 800;
            color: #212529;
        }

        .meaning-text {
            font-size: 22px;
            font-weight: 600;
            color: #e03131;
        }

        .sentence-text {
            font-size: 16px;
            color: #0b7285;
            line-height: 1.5;
            word-break: keep-all;
        }

        .progress-text {
            font-size: 14px;
            color: #868e96;
            margin-bottom: 20px;
            text-align: right;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sub-controls {
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div class="container" id="start-screen">
        <h1>토익 문법 퀴즈 V2</h1>
        <p style="margin-bottom: 30px; color: #666;">업데이트된 35개의 문제를 풀어보세요!</p>
        <div class="mode-btn-container">
            <button class="btn-primary" onclick="startQuiz('sequential')">순서대로 풀기</button>
            <button class="btn-primary" onclick="startQuiz('random')">랜덤 풀기</button>
        </div>
    </div>

    <div class="container hidden" id="quiz-screen">
        <div class="progress-text" id="progress-display">1 / 35</div>
        
        <div class="quiz-card">
            <div class="word-text" id="display-word">Word</div>
            <div class="meaning-text hidden" id="display-meaning">Meaning</div>
            <div class="sentence-text hidden" id="display-sentence">Sentence</div>
        </div>

        <div class="controls">
            <button class="btn-primary" id="main-action-btn" onclick="handleMainAction()">정답 확인 (뜻)</button>
            
            <div class="sub-controls">
                <button class="btn-secondary" onclick="resetCurrentQuestion()">방금 문장 다시풀기</button>
                <button class="btn-secondary" onclick="goToHome()">처음으로</button>
            </div>
        </div>
    </div>

    <script>
        // 버전 2의 업데이트된 전체 35개 데이터
        const rawDataList = [
            "Since > 그 후로 > 전접부/현재완료 필요/have since p.p",
            "Ever > 이때까지 > 긍정문에서 오답/단, 예외/비교급than ever, 최상급 ~ever",
            "No longer > 더 이상 ~않다 > 긍정문에 쓰고/의미는 부정/조be뒤 일앞에 위치",
            "Yet > 아직까지 > 긍정문에서 오답/단, 예외/have yet to, be yet to/부정문, 의문문, 조건문에서/문장 맨 뒤에 위치/부정문에선 not 바로 뒤/not yet",
            "Also > 또한 > 위치와 무관",
            "As well > 또한 > 문장 맨 뒤에 위치",
            "Ago > 전에, 미리 > 숫자기간 꼭 있어야해/꼭 과거여야해",
            "In advance > 전에, 미리 > 숫자기간 있어도 되고 없어도 되고/시제와 무관",
            "Ahead > 전에, 미리 > 숫자기간 있어도 되고 없어도 되고/시제와 무관",
            "Still > 여전히 > 긍정문에선 완료시제에선 오답/조be뒤일앞에 위치",
            "Promptly > 곧 > 주로 단순미래에서 좋은 답/before, after 앞에서도 좋은답",
            "Soon > 곧 > 주로 단순미래에서 좋은 답/before, after 앞에서도 좋은답",
            "Shortly > 곧 > 주로 단순미래에서 좋은 답/before, after 앞에서도 좋은답",
            "Immediately > 곧 > 주로 단순미래에서 좋은 답/before, after 앞에서도 좋은답",
            "Currently > 현재 > 현재진행시제에서 1순위 답",
            "Presently > 현재 > 현재진행시제에서 1순위 답",
            "Recently > 최근에 > 주로 단순과거, 현재완료에서 좋은답",
            "Lately > 최근에 > 주로 단순과거, 현재완료에서 좋은답",
            "Always > 빈도부사 > 주로 단순현재, 조be뒤일앞에 위치",
            "Usually > 빈도부사 > 주로 단순현재, 조be뒤일앞에 위치",
            "Generally > 빈도부사 > 주로 단순현재, 조be뒤일앞에 위치",
            "Normally > 빈도부사 > 주로 단순현재, 조be뒤일앞에 위치",
            "Commonly > 빈도부사 > 주로 단순현재, 조be뒤일앞에 위치",
            "Typically > 빈도부사 > 주로 단순현재, 조be뒤일앞에 위치",
            "Ordinarily > 빈도부사 > 주로 단순현재, 조be뒤일앞에 위치",
            "Customarily > 빈도부사 > 주로 단순현재, 조be뒤일앞에 위치",
            "Often > 빈도부사 > 주로 단순현재, 조be뒤일앞에 위치",
            "Frequently > 빈도부사 > 주로 단순현재, 조be뒤일앞에 위치",
            "Sometimes > 빈도부사 > 주로 단순현재, 조be뒤일앞에 위치",
            "Occasionally > 빈도부사 > 주로 단순현재, 조be뒤일앞에 위치",
            "Hardly > 빈도부사 > 주로 단순현재, 조be뒤일앞에 위치",
            "Rarely > 빈도부사 > 주로 단순현재, 조be뒤일앞에 위치",
            "Seldom > 빈도부사 > 주로 단순현재, 조be뒤일앞에 위치",
            "Scarcely > 빈도부사 > 주로 단순현재, 조be뒤일앞에 위치",
            "Never > 빈도부사 > 주로 단순현재, 조be뒤일앞에 위치"
        ];

        // 데이터 파싱
        const quizData = rawDataList.map(function(line) {
            const parts = line.split('>');
            return {
                word: parts[0].trim(),
                meaning: parts[1].trim(),
                sentence: parts[2].trim()
            };
        });

        // 상태 변수
        let currentMode = 'sequential';
        let questionOrder = [];
        let currentIndex = 0;
        let step = 0; // 0: 영단어만, 1: 뜻 공개, 2: 문장 공개 (모두 공개됨)

        // DOM 요소
        const startScreen = document.getElementById('start-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const displayWord = document.getElementById('display-word');
        const displayMeaning = document.getElementById('display-meaning');
        const displaySentence = document.getElementById('display-sentence');
        const mainActionBtn = document.getElementById('main-action-btn');
        const progressDisplay = document.getElementById('progress-display');

        // 퀴즈 시작 함수
        function startQuiz(mode) {
            currentMode = mode;
            currentIndex = 0;
            
            // 인덱스 배열 생성
            questionOrder = [];
            for (let i = 0; i < quizData.length; i++) {
                questionOrder.push(i);
            }
            
            // 랜덤 모드일 경우 배열 섞기
            if (mode === 'random') {
                for (let i = questionOrder.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    const temp = questionOrder[i];
                    questionOrder[i] = questionOrder[j];
                    questionOrder[j] = temp;
                }
            }

            startScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            
            renderQuestion();
        }

        // 문제 화면 그리기
        function renderQuestion() {
            if (currentIndex >= questionOrder.length) {
                alert("준비된 모든 35문제를 풀었습니다! 수고하셨습니다.");
                goToHome();
                return;
            }

            step = 0; // 초기 상태로 리셋
            const currentData = quizData[questionOrder[currentIndex]];

            // 텍스트 세팅
            displayWord.textContent = currentData.word;
            displayMeaning.textContent = currentData.meaning;
            displaySentence.textContent = currentData.sentence;

            // 진행률 표시
            progressDisplay.textContent = (currentIndex + 1) + " / " + questionOrder.length;

            // UI 가시성 초기화 (영어만 보임)
            displayMeaning.classList.add('hidden');
            displaySentence.classList.add('hidden');
            mainActionBtn.textContent = "정답 확인 (뜻)";
        }

        // 메인 버튼 동작 (뜻 -> 문장 -> 다음 문제)
        function handleMainAction() {
            if (step === 0) {
                // 뜻 공개
                displayMeaning.classList.remove('hidden');
                mainActionBtn.textContent = "정답 확인 (문법포인트)";
                step = 1;
            } else if (step === 1) {
                // 문장/문법포인트 공개
                displaySentence.classList.remove('hidden');
                mainActionBtn.textContent = "다음 문제";
                step = 2;
            } else if (step === 2) {
                // 다음 문제로 넘어가기
                currentIndex++;
                renderQuestion();
            }
        }

        // 방금 문제 다시풀기
        function resetCurrentQuestion() {
            step = 0;
            displayMeaning.classList.add('hidden');
            displaySentence.classList.add('hidden');
            mainActionBtn.textContent = "정답 확인 (뜻)";
        }

        // 처음 화면으로 돌아가기
        function goToHome() {
            quizScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
        }
    </script>
</body>
</html>
